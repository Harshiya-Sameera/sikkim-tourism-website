<script>
    const trans = {
        day: "{% translate 'Day' %}",
        seeking: "{% translate 'Seeking Wisdom...' %}",
        generate: "{% translate 'Generate My Itinerary' %}",
        error_general: "{% translate 'Spiritual connection failed. Please try again later.' %}"
    };

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    async function generatePlan() {
        const days = document.getElementById('trip-days').value;
        const interests = document.getElementById('trip-interests').value;
        const loader = document.getElementById('planner-loader');
        const resultsWrapper = document.getElementById('itinerary-wrapper');
        const resultsContainer = document.getElementById('itinerary-results');
        const btn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');

        if (!interests) {
            alert("{% translate 'Please share your interests traveler!' %}");
            return;
        }

        // Reset UI
        loader.classList.remove('hidden');
        resultsWrapper.classList.add('hidden');
        resultsContainer.innerHTML = "";
        btn.disabled = true;
        btn.classList.add('opacity-50', 'cursor-not-allowed');
        btnText.innerText = trans.seeking;

        try {
            const csrftoken = getCookie('csrftoken');
            const res = await fetch('/itinerary/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrftoken
                },
                body: JSON.stringify({ days, interests })
            });

            const data = await res.json();
            
            // Handle server-side errors
            if (!res.ok || data.error) {
                throw new Error(data.error || trans.error_general);
            }

            loader.classList.add('hidden');
            resultsWrapper.classList.remove('hidden');
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
            btnText.innerText = trans.generate;

            let currentDay = 0;
            let htmlContent = "";

            data.plan.forEach(item => {
                if (item.day !== currentDay) {
                    currentDay = item.day;
                    htmlContent += `
                        <h3 class="logo-font text-2xl font-bold text-red-800 mt-12 mb-6 border-b-2 border-amber-400 inline-block pb-1">
                            ${trans.day} ${currentDay}
                        </h3>`;
                }

                htmlContent += `
                <div class="relative pl-8 border-l-2 border-amber-100 pb-8 last:border-0">
                    <div class="absolute -left-[9px] top-0 w-4 h-4 bg-amber-500 rounded-full border-4 border-white"></div>
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-amber-50">
                        <div class="flex flex-col md:flex-row justify-between gap-2 mb-2">
                            <span class="text-[10px] font-black uppercase text-red-700 tracking-widest">
                                <i class="fa-solid fa-clock mr-1"></i> ${item.time}
                            </span>
                            <span class="text-[10px] font-black uppercase text-amber-600 tracking-widest">
                                <i class="fa-solid fa-location-dot mr-1"></i> ${item.location}
                            </span>
                        </div>
                        <h4 class="font-bold text-gray-800 text-lg">${item.activity}</h4>
                    </div>
                </div>`;
            });

            resultsContainer.innerHTML = htmlContent;
            resultsWrapper.scrollIntoView({ behavior: 'smooth' });

        } catch (e) {
            console.error("ITINERARY FETCH ERROR:", e);
            loader.classList.remove('hidden');
            loader.innerHTML = `
                <div class="p-8 bg-red-50 rounded-3xl border border-red-100 text-red-600 font-bold uppercase text-[10px]">
                    <i class="fa-solid fa-circle-exclamation mr-2"></i> ${e.message}
                </div>`;
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
            btnText.innerText = trans.generate;
        }
    }

    function downloadPDF() {
        const element = document.getElementById('itinerary-results');
        const opt = {
            margin: 1,
            filename: 'Sikkim_Sacred_Itinerary.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>
