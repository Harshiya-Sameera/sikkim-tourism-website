{% load i18n %}
{% block map_body %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<section class="h-[85vh] relative overflow-hidden animate-in fade-in duration-700">
    <div id="main-map" class="w-full h-full grayscale-[20%]"></div>

    <div class="absolute top-6 left-6 z-[1000] hidden md:block">
        <div class="bg-white/90 backdrop-blur-md p-8 rounded-[2.5rem] border border-amber-100 shadow-2xl max-w-xs shadow-amber-900/10">
            <h3 class="logo-font text-red-800 text-xl font-black mb-2 uppercase tracking-tighter">{% translate "Sacred Geography" %}</h3>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest leading-relaxed mb-6">
                {% translate "Explore the precise locations of Sikkim's ancient monasteries and hidden wonders." %}
            </p>
            <div class="pt-4 border-t border-amber-50">
                <div class="flex items-center gap-3 text-[10px] font-black text-gray-700 uppercase tracking-widest">
                    <i class="fa-solid fa-dharmachakra text-red-700 animate-spin-slow"></i>
                    <span id="site-count">0 {% translate "Sites Mapped" %}</span>
                </div>
            </div>
            <button onclick="locateUser()" class="mt-4 w-full bg-red-800 text-white text-[9px] font-black py-3 rounded-xl uppercase tracking-widest hover:bg-red-700 transition-all">
                Find My Location
            </button>
        </div>
    </div>
</section>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var map = L.map('main-map').setView([27.3314, 88.6138], 9);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        var monasticIcon = L.divIcon({
            html: `<div class="relative flex items-center justify-center">
                    <div class="absolute w-8 h-8 bg-amber-500 rounded-full opacity-20 animate-ping"></div>
                    <div class="relative bg-red-800 border-2 border-amber-400 w-10 h-10 rounded-2xl flex items-center justify-center shadow-lg transform rotate-45">
                        <i class="fa-solid fa-gopuram text-amber-400 -rotate-45 text-xs"></i>
                    </div>
                   </div>`,
            className: 'custom-monk-marker',
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        });

        // AJAX Fetch replaces the manual Django Loop for better performance
        fetch("{% url 'places_geojson' %}")
        .then(res => res.json())
        .then(data => {
            document.getElementById('site-count').innerText = data.features.length + " Sites Mapped";
            L.geoJSON(data, {
                pointToLayer: (feature, latlng) => L.marker(latlng, { icon: monasticIcon }),
                onEachFeature: (feature, layer) => {
                    layer.bindPopup(`
                        <div class="p-4 text-center">
                            <h4 class="font-black text-red-800 text-sm uppercase mb-1">${feature.properties.name}</h4>
                            <p class="text-[10px] font-bold text-amber-600 mb-4 uppercase">${feature.properties.location_name}</p>
                            <a href="/tourism/place/${feature.id}/" 
                               class="bg-red-800 text-white px-5 py-2 rounded-full text-[9px] font-black uppercase tracking-widest shadow-lg inline-block" 
                               style="text-decoration:none;">
                                {% translate "Visit Site" %}
                            </a>
                        </div>`);
                }
            }).addTo(map);
        });
    });

    function locateUser() {
    const btn = event.target;
    btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> Finding you...';
    btn.disabled = true;

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                window.location.href = `/explore/?lat=${pos.coords.latitude}&lng=${pos.coords.longitude}`;
            },
            (err) => {
                alert("Could not get location. Please enable GPS.");
                btn.innerHTML = "Find My Location";
                btn.disabled = false;
            }
        );
    }
}
</script>
{% endblock %}
