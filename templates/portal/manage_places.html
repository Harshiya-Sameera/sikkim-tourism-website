{% extends 'base2.html' %}
{% load i18n %}
{% block dashboard_content %}
<div class="p-8 bg-white rounded-[3rem] shadow-xl border border-amber-100 animate-in fade-in duration-700">
    <div class="flex justify-between items-center mb-8">
        <h2 class="logo-font text-2xl font-bold text-red-800 uppercase">{% translate "Content Manager" %}</h2>
        <a href="/admin/tourism/touristplace/add/" class="btn-glow text-white px-6 py-2 rounded-full text-[10px] font-black uppercase shadow-lg">Add New Site</a>
    </div>
    <div class="overflow-x-auto rounded-3xl border border-gray-100">
        <table class="w-full text-left">
            <thead class="bg-orange-50/50 border-b border-amber-100">
                <tr>
                    <th class="p-5 text-[10px] font-black text-gray-400 uppercase tracking-widest">Site Name</th>
                    <th class="p-5 text-[10px] font-black text-gray-400 uppercase tracking-widest">Status</th>
                    <th class="p-5 text-[10px] font-black text-gray-400 uppercase tracking-widest">Action</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-50">
                {% for place in places %}
                <tr class="hover:bg-amber-50/20 transition-all">
                    <td class="p-5 font-bold text-gray-700">{{ place.name }}</td>
                    <td class="p-5"><span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-[8px] font-black uppercase">Live</span></td>
                    <td class="p-5"><a href="/admin/tourism/touristplace/{{ place.id }}/change/" class="text-red-700 font-black text-[10px] uppercase hover:underline">Edit</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
