{% extends 'base1.html' %}
{% block content %}
<div class="flex items-center justify-center py-20 px-4">
    <div class="max-w-md w-full bg-white p-10 rounded-[2rem] shadow-2xl border border-amber-50 text-center">
        <i class="fa-solid fa-om text-5xl text-red-700 mb-6 animate-pulse"></i>
        <h2 class="logo-font text-2xl font-black text-gray-800 mb-2 uppercase">Verify <span class="text-amber-500">Identity</span></h2>
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-8">Check your email for the 6-digit code</p>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <input name="otp" maxlength="6" required placeholder="000000"
                   class="w-full text-center text-3xl tracking-[0.5em] py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-4 focus:ring-amber-500/10 outline-none font-black text-gray-700">
            <button type="submit" class="w-full btn-glow text-white font-black py-4 rounded-xl uppercase tracking-widest text-xs">
                Activate Traveler Profile
            </button>
        </form>
    </div>
</div>
{% endblock %}
