{% extends 'base1.html' %}
{% load i18n %}
{% block content %}
<div class="flex items-center justify-center py-20 px-4 cultural-bg">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-[2rem] shadow-2xl border border-amber-100">
        <div class="text-center">
            <h2 class="logo-font text-3xl font-black text-red-800 tracking-tighter uppercase">
                Join <span class="text-amber-500">Explorer</span>
            </h2>
            <p class="mt-2 text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]">Create your traveler profile
            </p>
        </div>


        <form class="mt-8 space-y-5" method="POST">
            {% csrf_token %}
            <div class="space-y-4">
                <div class="relative">
                    <i class="fa-solid fa-at absolute left-4 top-4 text-amber-400"></i>
                    <input name="email" type="email" required placeholder="Traveler Email"
                        class="w-full pl-12 pr-4 py-3 border border-gray-100 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none font-medium bg-gray-50">
                </div>
                <div class="relative">
                    <i class="fa-solid fa-key absolute left-4 top-4 text-amber-400"></i>
                    <input name="password" type="password" required placeholder="Security Password"
                        class="w-full pl-12 pr-4 py-3 border border-gray-100 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none font-medium bg-gray-50">
                </div>
            </div>

            <div class="bg-amber-50 p-4 rounded-xl border border-amber-100 flex items-start gap-3">
                <i class="fa-solid fa-circle-info text-amber-600 mt-1"></i>
                <p class="text-[10px] text-amber-800 font-bold uppercase tracking-tight">OTP Verification required to
                    activate account.</p>
            </div>

            <div class="flex items-center justify-between text-[10px] font-bold uppercase">
                <a href="{% url 'password_reset' %}" class="text-gray-400 hover:text-red-700">Lost Password?</a>
                <a href="{% url 'login' %}" class="text-red-700 hover:underline">Already have an account?</a>
            </div>

            <button type="submit"
                class="w-full btn-glow text-white font-black py-4 rounded-xl uppercase tracking-widest text-xs">
                Initialize Explorer Profile
            </button>
        </form>
    </div>
</div>
{% endblock %}
