{% extends 'base1.html' %}
{% load i18n %}
{% block content %}
<div class="flex items-center justify-center py-20 px-4 cultural-bg">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-[2rem] shadow-2xl border border-amber-100">
        <div class="text-center">
            <h2 class="logo-font text-3xl font-black text-red-800 tracking-tighter uppercase">
                Tourist <span class="text-amber-500">Login</span>
            </h2>
            <p class="mt-2 text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]">
                Explore Sikkim with AI Assistance
            </p>
        </div>
        
        <form class="mt-8 space-y-6" method="POST">
            {% csrf_token %}
            <div class="space-y-4">
                <div class="relative">
                    <i class="fa-solid fa-envelope absolute left-4 top-4 text-amber-400"></i>
                    <input name="username" type="email" required placeholder="Email Address"
                           class="w-full pl-12 pr-4 py-3 border border-gray-100 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none font-medium bg-gray-50">
                </div>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-4 text-amber-400"></i>
                    <input id="password" name="password" type="password" required placeholder="Password"
                           class="w-full pl-12 pr-12 py-3 border border-gray-100 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none font-medium bg-gray-50">
                </div>
            </div>

            <div class="flex items-center justify-between text-[10px] font-bold uppercase">
                <a href="{% url 'password_reset' %}" class="text-gray-400 hover:text-red-700">Lost Password?</a>
                <a href="{% url 'signup' %}" class="text-red-700 hover:underline">New Account</a>
            </div>

            <button type="submit" class="w-full btn-glow text-white font-black py-4 rounded-xl uppercase tracking-widest text-xs flex items-center justify-center gap-3">
                <i class="fa-solid fa-dharmachakra"></i> Authenticate
            </button>
        </form>
    </div>
</div>
{% endblock %}
