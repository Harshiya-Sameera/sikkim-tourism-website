{% extends 'base1.html' %}
{% load i18n %}
{% block content %}

<div class="flex items-center justify-center py-20 px-4 cultural-bg">
    <div class="max-w-md w-full bg-white p-12 rounded-[2rem] shadow-2xl border border-amber-100 text-center">
        <i class="fa-solid fa-paper-plane text-5xl text-red-700 mb-6 animate-float"></i>

        <h1 class="logo-font text-2xl font-black mb-3 uppercase tracking-tighter text-red-800">
            {% blocktranslate %}Link <span class="text-amber-500">Dispatched</span>{% endblocktranslate %}
        </h1>

        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest leading-relaxed">
            {% translate "Check your inbox for the recovery link. Our AI monk has sent the instructions to your registered email." %}
        </p>

        <a href="{% url 'login' %}"
           class="mt-8 inline-block text-xs font-black text-red-700 uppercase hover:text-amber-600 transition-colors tracking-widest">
            {% translate "Return to Portal" %}
        </a>
    </div>
</div>

{% endblock %}
