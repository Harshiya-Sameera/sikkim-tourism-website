{% extends "base1.html" %}
{% load i18n %}

{% block content %}
<div class="flex items-center justify-center py-20 px-4 cultural-bg">
    <div class="max-w-md w-full bg-white p-12 rounded-[2rem] shadow-2xl border border-amber-100 text-center">
        <div class="w-24 h-24 bg-amber-50 text-red-700 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner border-2 border-amber-100">
            <i class="fa-solid fa-dharmachakra text-5xl animate-spin-slow"></i>
        </div>

        <h1 class="logo-font text-2xl font-black text-red-800 mb-4 tracking-tighter uppercase">
            {% translate "Credentials Updated" %}
        </h1>

        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest leading-relaxed mb-10">
            {% translate "Your explorer profile security key has been successfully changed. You may now return to the portal and log in." %}
        </p>

        <a href="{% url 'login' %}"
           class="btn-glow text-white px-10 py-4 rounded-xl font-black uppercase tracking-widest text-xs inline-block transition-transform active:scale-95">
            {% translate "Authenticate Now" %}
        </a>
    </div>
</div>
{% endblock %}
